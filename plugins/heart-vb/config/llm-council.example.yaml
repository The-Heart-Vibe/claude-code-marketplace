# LLM Council Configuration — The Heart Vibe template
# Skopiowane przez install.sh do ~/.config/llm-council/config.yaml
#
# WYBIERZ PROFIL — odkomentuj sekcję `defaults` odpowiednią dla Twojej roli.
# Ustaw też tylko providerów których masz zalogowanych (sprawdź `council doctor`).
#
# Providery i wymagania:
#   - gemini-cli — Google Workspace OAuth (każdy @theheart.tech ma)
#   - codex      — ChatGPT Plus/Pro + `codex login` (typowo tech team)
#   - claude     — Claude Code CLI (działa TYLKO z terminala spoza CC session)

providers:
  - name: gemini-cli
    # Google Workspace OAuth (oauth-personal) — sprawdź: gemini --version
  - name: codex
    # ChatGPT Plus/Pro — sprawdź: codex doctor
  - name: claude
    # Claude Code CLI — NIE działa z poziomu aktywnej Claude Code session

# ── PROFIL ANALITYK / KONSULTANT (default) ───────────────────────────────────
# Bez ChatGPT Plus → tylko gemini-cli. Council nie jest pełną radą (1 provider)
# ale gemini ma duży token pool przez Workspace, więc to wystarcza dla 80% pracy.
# Skille jak board-prep, competitive-teardown działają niezależnie od council.

defaults:
  providers:
    - gemini-cli
  timeout: 180
  max_retries: 2
  summary_tier: actions

# ── PROFIL TECH TEAM (z ChatGPT Plus) ────────────────────────────────────────
# Odkomentuj jeśli masz ChatGPT Plus i zalogowanego codex CLI.
# Daje prawdziwą 2-perspective debate (gemini vs gpt).
#
# defaults:
#   providers:
#     - gemini-cli
#     - codex
#   timeout: 240
#   max_retries: 2
#   summary_tier: actions

# ── PROFIL POWER (3 providery, używany TYLKO z terminala spoza CC) ───────────
# Pełna 3-LLM rada (claude + codex + gemini). DZIAŁA tylko gdy odpalasz
# council CLI z normal terminala, NIE z poziomu sesji Claude Code (claude
# fails wtedy przez self-invocation block).
#
# defaults:
#   providers:
#     - gemini-cli
#     - codex
#     - claude
#   timeout: 300
#   max_retries: 2
#   summary_tier: actions
